{% extends 'campaigns/base.html' %}

{% block content %}
<style>
    .auth-card {
        border-radius: 1rem;
        border: none;
        overflow: hidden;
        background-color: #ffffff;
    }
    .auth-header {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        padding: 2.5rem 2rem;
        text-align: center;
        border-bottom: none;
    }
    .auth-card-body {
        padding: 2.5rem 2rem;
    }
    .custom-input {
        width: 100%;
        padding: 1rem;
        font-size: 1.5rem;
        text-align: center;
        letter-spacing: 5px;
        font-weight: 700;
        border-radius: 0.5rem;
        border: 2px solid #d1d5db;
        transition: all 0.2s ease;
    }
    .custom-input:focus {
        border-color: #10b981;
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        outline: none;
    }
    .auth-btn {
        background-color: #10b981;
        border: none;
        padding: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        border-radius: 0.5rem;
        transition: all 0.2s ease-in-out;
    }
    .auth-btn:hover {
        background-color: #059669;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
</style>

<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="card auth-card shadow-lg">
            <div class="card-header auth-header">
                <h3 class="mb-1 fw-bold text-white">Security Check</h3>
                <p class="mb-0 text-white-50 small">Verify your email to continue</p>
            </div>
            <div class="card-body auth-card-body">

                <div class="text-center mb-4">
                    <svg width="48" height="48" fill="#10b981" class="bi bi-shield-lock-fill mb-3" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.777 11.777 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7.159 7.159 0 0 0 1.048-.625 11.775 11.775 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.541 1.541 0 0 0-1.044-1.263 62.467 62.467 0 0 0-2.887-.87C9.843.266 8.69 0 8 0zm0 5a1.5 1.5 0 0 1 .5 2.915l.385 1.99a.5.5 0 0 1-.491.595h-.788a.5.5 0 0 1-.49-.595l.384-1.99A1.5 1.5 0 0 1 8 5z"/>
                    </svg>
                    <p class="text-muted">We sent a 6-digit verification code to <strong>{{ email }}</strong>.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <input type="text" name="otp" class="custom-input" placeholder="000000" maxlength="6" autocomplete="off" required>
                    </div>
                    <button type="submit" class="btn auth-btn btn-primary w-100 text-white">
                        Verify & Create Account
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'register' %}" class="text-muted text-decoration-none small">Cancel and go back</a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}

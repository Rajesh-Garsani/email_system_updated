{% extends 'campaigns/base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm" style="border-radius: 1rem;">
            <div class="card-body p-5">
                <h1 class="fw-bold mb-2 text-dark">{{ page.title }}</h1>
                <p class="text-muted mb-4 pb-3 border-bottom">Last updated: {{ page.last_updated|date:"F j, Y" }}</p>
                <div style="color: #475569; line-height: 1.8; font-size: 1.05rem;">
                    {{ page.content|linebreaks }}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

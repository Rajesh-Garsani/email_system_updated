{% extends 'campaigns/base.html' %}
{% block content %}
<div class="row py-4">
    <div class="col-lg-8 mx-auto">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'dashboard' %}" class="text-decoration-none">Home</a></li>
                <li class="breadcrumb-item text-muted">Resources</li>
                <li class="breadcrumb-item active" aria-current="page">{{ page.title }}</li>
            </ol>
        </nav>
        <div class="card border-0 shadow-sm" style="border-radius: 1rem;">
            <div class="card-body p-5">
                <h1 class="fw-bold mb-3 text-dark" style="letter-spacing: -0.5px;">{{ page.title }}</h1>
                <p class="text-muted mb-5 pb-3 border-bottom">Last updated: {{ page.last_updated|date:"F j, Y" }}</p>
                <div class="resource-content" style="color: #334155; line-height: 1.8; font-size: 1.05rem;">
                    {{ page.content|linebreaks|safe }}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
